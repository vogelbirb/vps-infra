services:
  # Reverse proxy
  caddy:
    image: caddy:latest
    container_name: caddy
    restart: always
    cap_add:
      - NET_ADMIN
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./conf:/etc/caddy
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - web-net
    environment:
      EMAIL: ${EMAIL?error}

volumes:
  caddy_data:
  caddy_config:
    
networks:
  web-net:
    external: true
